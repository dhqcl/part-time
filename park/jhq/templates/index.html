<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHQ Park</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(255, 214, 153, 0.35), transparent 35%),
                linear-gradient(135deg, #f5efe2 0%, #e7edf3 100%);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }
        .panel {
            max-width: 720px;
            margin: 8vh auto;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(35, 52, 73, 0.08);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(35, 52, 73, 0.12);
            padding: 28px;
        }
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #243447;
        }
        .subtitle {
            color: #62748a;
        }
        .result-card {
            background: #f7f9fb;
            border-radius: 18px;
            padding: 18px;
            border: 1px solid #e4e9ef;
        }
        .result-line {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 0;
            border-bottom: 1px solid #ebeff4;
        }
        .result-line:last-child {
            border-bottom: 0;
        }
        .label {
            color: #6a7b8f;
        }
        .value {
            color: #243447;
            font-weight: 600;
            text-align: right;
            word-break: break-word;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            background: #d7f0df;
            color: #146c43;
            font-weight: 700;
        }
        .status-pending {
            background: #fff3cd;
            color: #997404;
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1 class="title mb-2">金虹桥停车</h1>
        <p class="subtitle mb-4">输入车牌后可直接查询或抵扣，抵扣完成后会自动刷新最新结果。</p>

        <div class="input-group input-group-lg mb-3">
            <span class="input-group-text">车牌</span>
            <input id="plateInput" type="text" class="form-control" placeholder="例如：沪A12345">
        </div>

        <div class="d-flex gap-2 mb-4">
            <button id="queryBtn" class="btn btn-dark">查询</button>
            <button id="discountBtn" class="btn btn-warning">抵扣</button>
            <button id="randomDiscountBtn" class="btn btn-outline-warning">随机抵扣</button>
        </div>

        <div id="alertContainer"></div>

        <section id="resultCard" class="result-card d-none">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <strong id="resultPlate">-</strong>
                <span id="resultStatus" class="status-badge status-pending">未抵扣</span>
            </div>
            <div class="result-line">
                <span class="label">入场时间</span>
                <span class="value" id="entryTime">-</span>
            </div>
            <div class="result-line">
                <span class="label">停车时长</span>
                <span class="value" id="parkingMinutes">-</span>
            </div>
            <div class="result-line">
                <span class="label">待支付费用</span>
                <span class="value" id="parkingFee">-</span>
            </div>
            <div class="result-line">
                <span class="label">抵扣返回</span>
                <span class="value" id="discountMessage">-</span>
            </div>
        </section>
    </main>

    <script>
        const plateInput = document.getElementById('plateInput');
        const alertContainer = document.getElementById('alertContainer');

        function sanitizePlate(raw) {
            return Array.from(raw.toUpperCase())
                .filter((char) => /[\u4e00-\u9fffA-Z0-9挂学警港澳领使]/.test(char))
                .join('');
        }

        plateInput.addEventListener('input', () => {
            const sanitized = sanitizePlate(plateInput.value);
            if (sanitized !== plateInput.value) {
                plateInput.value = sanitized;
            }
        });

        document.getElementById('queryBtn').addEventListener('click', () => submitAction('/api/query'));
        document.getElementById('discountBtn').addEventListener('click', () => submitAction('/api/discount'));
        document.getElementById('randomDiscountBtn').addEventListener('click', () => submitAction('/api/discount', { random_open_id: true }));

        async function submitAction(url, extraBody = {}) {
            const plate = sanitizePlate(plateInput.value);
            plateInput.value = plate;
            if (!plate) {
                showAlert('请输入车牌号', 'warning');
                return;
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate, ...extraBody })
                });
                const data = await response.json();
                if (!response.ok) {
                    showAlert(data.error || '请求失败', 'danger');
                    if (data.plate) {
                        plateInput.value = data.plate;
                    }
                    return;
                }

                plateInput.value = data.plate;
                renderResult(data.plate, data.result, data.discount_result || null);
                if (data.discount_result) {
                    showAlert('抵扣完成，已自动刷新查询结果', 'success');
                }
            } catch (error) {
                showAlert(`网络异常: ${error}`, 'danger');
            }
        }

        function renderResult(plate, result, discountMessage) {
            const resultCard = document.getElementById('resultCard');
            resultCard.classList.remove('d-none');

            const status = result['状态'] || '未抵扣';
            const statusEl = document.getElementById('resultStatus');
            statusEl.textContent = status;
            statusEl.className = `status-badge ${status === '已抵扣' ? '' : 'status-pending'}`;

            document.getElementById('resultPlate').textContent = plate;
            document.getElementById('entryTime').textContent = result['入场时间'] || '-';
            document.getElementById('parkingMinutes').textContent = `${result['停车时长'] || 0} 分钟`;
            document.getElementById('parkingFee').textContent = `￥${Number(result['需要支付的费用'] || 0).toFixed(2)}`;
            document.getElementById('discountMessage').textContent = discountMessage || '-';
        }

        function showAlert(message, type) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" role="alert">${message}</div>
            `;
        }
    </script>
</body>
</html>

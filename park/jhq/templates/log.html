<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHQ Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f8;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }
        .wrap {
            max-width: 980px;
            margin: 40px auto;
        }
        .card {
            border: 0;
            border-radius: 20px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="card p-4">
            <h1 class="h3 mb-3">日志统计</h1>
            <p class="text-muted mb-4">按天聚合查询车牌数与成功抵扣车牌数。成功抵扣以返回内容包含“折扣成功”为准。</p>
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>查询记录数</th>
                            <th>查询车牌数</th>
                            <th>成功抵扣记录数</th>
                            <th>成功抵扣车牌数</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for row in rows %}
                        <tr>
                            <td>{{ row.date }}</td>
                            <td>{{ row.query_records }}</td>
                            <td>{{ row.query_plate_count }}</td>
                            <td>{{ row.discount_success_records }}</td>
                            <td>{{ row.discount_success_plate_count }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">暂无日志数据</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</body>
</html>
